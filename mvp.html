<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Franco Quentão | Zer01 — MVP</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000000;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Courier New', 'SF Mono', 'Fira Code', monospace;
            padding: 1.5rem;
            position: relative;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: radial-gradient(rgba(255,255,255,0.03) 1px, transparent 1px);
            background-size: 32px 32px;
            pointer-events: none;
            z-index: 0;
        }

        .monolith {
            max-width: 1000px;
            width: 100%;
            position: relative;
            z-index: 2;
        }

        .video-void {
            background: #0a0a0a;
            border: 1px solid #2a2a2a;
            box-shadow: 0 0 0 1px #111, 0 20px 40px -12px rgba(0,0,0,0.8);
            transition: border 0.2s ease;
            overflow: hidden;
        }

        .video-wrapper {
            position: relative;
            width: 100%;
            background: #000;
        }

        .video-wrapper iframe {
            width: 100%;
            aspect-ratio: 16 / 9;
            display: block;
            border: none;
        }

        .sigil {
            margin-top: 1.5rem;
            text-align: center;
            font-size: 0.7rem;
            letter-spacing: 2px;
            color: #6a6a6a;
            text-transform: uppercase;
            border-top: 0.5px solid #2a2a2a;
            padding-top: 1.2rem;
            font-weight: 400;
            font-family: monospace;
        }

        .sigil span {
            color: #aaaaaa;
            font-weight: 500;
        }

        .video-void:hover {
            border-color: #4a4a4a;
            box-shadow: 0 0 0 1px #333, 0 24px 48px -16px black;
        }

        @media (max-width: 768px) {
            .sigil {
                font-size: 0.6rem;
            }
        }
    </style>
</head>
<body>
<div class="monolith">
    <div class="video-void">
        <div class="video-wrapper">
            <!-- Google Drive Embed - Vídeo Franco Quentão (cores normais) -->
            <iframe src="https://drive.google.com/file/d/1R5HhEf_B0kfPp-M-TNotBgpx9kX66hhz/preview" allow="autoplay" allowfullscreen></iframe>
        </div>
    </div>
    <div class="sigil">
        <span>FRANCO QUENTÃO — MVP · ZER01</span>
    </div>
</div>
</body>
</html>
